<!doctype html>
<html lang="en" data-sveltekit-preload-data="hover">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/assets/bmi-logo-masters-512.png" />
		<link rel="icon" sizes="192x192" href="/assets/bmi-logo-masters-192.png" />
		<link rel="apple-touch-icon" href="/assets/bmi-logo-masters-180.png" />
		<link rel="manifest" href="/manifest.json?v=21.5.0" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<!-- Primary Meta Tags -->
		<meta name="title" content="BMI Stellar — Privacy-First BMI Companion" />
		<meta
			name="description"
			content="Calculate BMI, TDEE, body-fat estimates, and ideal weight range with BMI Stellar — a privacy-first, offline-ready health companion with charts and encrypted backups."
		/>
		<meta
			name="keywords"
			content="BMI calculator, BMI Stellar, body mass index, TDEE calculator, body fat estimate, ideal weight, health tracker, fitness, encrypted backup, offline PWA"
		/>
		<meta name="author" content="rezky_nightky (oxyzenQ)" />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#000000" />
		<meta name="msapplication-TileColor" content="#000000" />
		<meta name="msapplication-TileImage" content="/assets/bmi-logo-masters-192.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="BMI Stellar" />
		<meta name="application-name" content="BMI Stellar" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="color-scheme" content="dark" />
		<style>
			html,
			body {
				margin: 0;
				min-height: 100%;
				background: #0a0e1a;
				color-scheme: dark;
				overflow-x: hidden;
			}

			body {
				min-height: 100vh;
				min-height: 100svh;
			}

			.app-root {
				display: block;
				min-height: 100%;
				background: transparent;
			}

			@media (hover: none) and (pointer: coarse) {
				html::before {
					content: '';
					position: fixed;
					inset: 0;
					z-index: 2147483000;
					pointer-events: none;
					background:
						linear-gradient(
							90deg,
							#0a0e1a 0,
							transparent 2px,
							transparent calc(100% - 2px),
							#0a0e1a 100%
						),
						linear-gradient(
							180deg,
							#0a0e1a 0,
							transparent 2px,
							transparent calc(100% - 2px),
							#0a0e1a 100%
						);
				}
			}
		</style>

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://bmi-stellar.vercel.app/" />
		<meta property="og:title" content="BMI Stellar — Privacy-First BMI Companion" />
		<meta
			property="og:description"
			content="A privacy-first BMI companion with TDEE, body-fat estimates, progress charts, offline support, and encrypted backups."
		/>
		<meta
			property="og:image"
			content="https://bmi-stellar.vercel.app/assets/bmi-logo-masters-1024.png"
		/>
		<meta property="og:image:width" content="1024" />
		<meta property="og:image:height" content="1024" />
		<meta property="og:image:alt" content="BMI Stellar Logo" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:site_name" content="BMI Stellar" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://bmi-stellar.vercel.app/" />
		<meta name="twitter:title" content="BMI Stellar — Privacy-First BMI Companion" />
		<meta
			name="twitter:description"
			content="Calculate BMI, TDEE, body-fat estimates, and track progress locally with offline support and encrypted backups."
		/>
		<meta
			name="twitter:image"
			content="https://bmi-stellar.vercel.app/assets/bmi-logo-masters-1024.png"
		/>
		<meta name="twitter:image:alt" content="BMI Stellar Logo" />

		<!-- Prevent wallpaper flash: set CSS var from localStorage before paint -->
		<script>
			(function () {
				try {
					var t = localStorage.getItem('bmi.wallpaperTheme');
					var m = {
						blackhole: 'url("/images/blackhole.webp")',
						spaceship: 'url("/images/spaceshipx.webp")',
						space: 'url("/images/oxyzen-zenlysium.webp")'
					};
					if (t && m[t]) document.documentElement.style.setProperty('--wallpaper-current', m[t]);
				} catch (e) {}
			})();
		</script>

		<!-- Security headers are set via hooks.server.ts (authoritative) -->

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div class="app-root">%sveltekit.body%</div>
	</body>
</html>
