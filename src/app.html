<!doctype html>
<html lang="en" data-sveltekit-preload-data="hover">

<head>
        <meta charset="utf-8" />
        <link rel="icon" href="%sveltekit.assets%/assets/new_bmi_logo_2026.webp" />
        <link rel="manifest" href="/manifest.json" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- SEO and accessibility -->
        <meta name="description"
                content="A simple BMI calc - modern, responsive Body Mass Index calculator with space-themed design. Calculate your BMI and learn about your health status." />
        <meta name="keywords" content="BMI calculator, body mass index, health, fitness, weight calculator" />
        <meta name="author" content="Rezky Nightky" />
        <meta name="robots" content="index, follow" />

        <!-- Open Graph -->
        <meta property="og:title" content="A Simple BMI Calc" />
        <meta property="og:description"
                content="A simple BMI calc - modern, responsive Body Mass Index calculator with space-themed design." />
        <meta property="og:image" content="/assets/new_bmi_logo_2026.webp" />
        <meta property="og:type" content="website" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="A Simple BMI Calc" />
        <meta name="twitter:description"
                content="A simple BMI calc - modern, responsive Body Mass Index calculator with space-themed design." />

        <!-- Theme color -->
        <meta name="theme-color" content="#7c3aed" />
        <meta name="msapplication-TileColor" content="#070a1c" />

        <!-- Prevent wallpaper flash: set CSS var from localStorage before paint -->
        <script>
                (function(){try{var t=localStorage.getItem('bmi.wallpaperTheme');if(t==='energy')document.documentElement.style.setProperty('--wallpaper-current','url("/images/oxyzen-cyberagent.webp")');}catch(e){}})();
        </script>

        <!-- Security headers are set via hooks.server.ts (authoritative) -->

        %sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
        <div class="app-root">%sveltekit.body%</div>
</body>

</html>
