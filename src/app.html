        <!-- Prevent wallpaper flash: set CSS var from localStorage before paint -->
        <script>
                (function(){try{var t=localStorage.getItem('bmi.wallpaperTheme');var m={'blackhole':'url("/images/blackhole.webp")','spaceship':'url("/images/spaceshipx.webp")','space':'url("/images/oxyzen-zenlysium.webp")'};if(t&&m[t])document.documentElement.style.setProperty('--wallpaper-current',m[t]);}catch(e){}})();
        </script>

        <!-- Security headers are set via hooks.server.ts (authoritative) -->

        %sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
        <div class="app-root">%sveltekit.body%</div>
