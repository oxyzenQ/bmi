---
name: 🔎 Security Audit

on:
  schedule:
    # Daily at 00:00 UTC (07:00 WIB)
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24
  VERCEL_NODE_RUNTIME: nodejs24.x

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve Bun version
        id: bun-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').packageManager?.match(/^bun@(.+)$/)?.[1] || ''")"
          if [ -z "$version" ]; then
            echo "package.json packageManager must be bun@<version>" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit
        run: bun run audit:deps

      - name: LOC policy audit
        run: bun run audit:loc

      - name: Header policy audit
        run: bun run audit:headers

      - name: PWA offline-shell audit
        run: bun run audit:pwa-offline
