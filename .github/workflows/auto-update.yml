---
name: ⛑️ Auto Update Dependencies

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at 00:00 UTC (08:00 SGT)
  workflow_dispatch:       # Manual trigger option
    inputs:
      strategy:
        description: How to publish updates
        type: choice
        options:
          - pr
          - direct
        default: pr
      force_update:
        description: Continue even if checks fail
        type: boolean
        default: false

permissions:
  contents: write
  actions: read
  pull-requests: write

env:
  UPDATE_STRATEGY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.strategy || 'pr' }}
  FORCE_UPDATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_update || 'false' }}
  OWNER_NAME: ${{ github.repository_owner }}
  OWNER_EMAIL: 130107241+oxyzenQ@users.noreply.github.com
  BASE_BRANCH: ${{ github.event.repository.default_branch }}

jobs:
  auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          fetch-tags: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install current dependencies
        run: bun install --frozen-lockfile

      - name: Update all dependencies
        run: |
          echo "🔄 Updating dependencies..."
          bun update

          echo "🔍 Checking for security vulnerabilities..."
          bun audit || true

      - name: Run quality checks
        run: |
          echo "✅ Running type checking..."
          bun run type-check

          echo "✅ Running linter..."
          bun run lint

          echo "✅ Running tests..."
          bun run test:ci
        continue-on-error: ${{ env.FORCE_UPDATE == 'true' }}

      - name: Build project
        run: |
          echo "🏗️ Building project..."
          bun run build

      - name: Check for changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "📦 No dependency updates available"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "📦 Dependencies updated!"
            git status --porcelain | head -n 200
            git diff --stat | head -n 200
          fi

      - name: Commit and push changes
        id: commit_msg
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          {
            echo "title=chore(deps): update dependencies"
            echo "commit_message=chore(deps): update dependencies"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and push changes (direct)
        if: steps.check_changes.outputs.changes == 'true' && env.UPDATE_STRATEGY == 'direct'
        run: |
          git config --global user.name "${OWNER_NAME}"
          git config --global user.email "${OWNER_EMAIL}"

          git add -A
          git commit -m "${{ steps.commit_msg.outputs.commit_message }}" \
            -m "🤖 Automated by GitHub Actions" \
            -m "📦 Updated $(git status --porcelain | wc -l) file(s)" \
            -m "⏰ $(date -u '+%A, %B %d, %Y at %H:%M:%S UTC')" \
            -m "🎯 Workflow: auto-update.yml"
          git push origin "HEAD:${BASE_BRANCH}"

          echo "✅ Changes committed and pushed to ${BASE_BRANCH}!"

      - name: Create pull request (pr)
        id: cpr
        if: steps.check_changes.outputs.changes == 'true' && env.UPDATE_STRATEGY == 'pr'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ${{ steps.commit_msg.outputs.commit_message }}
          title: ${{ steps.commit_msg.outputs.title }}
          body: ${{ steps.commit_msg.outputs.title }}
          branch: bot/auto-update-deps
          base: ${{ env.BASE_BRANCH }}
          delete-branch: true

      - name: Summary
        if: always()
        run: |
          {
            echo "════════════════════════════════════════════════════════"
            echo "🤖 AUTO UPDATE SUMMARY"
            echo "════════════════════════════════════════════════════════"
            echo ""
            echo "Strategy: ${{ env.UPDATE_STRATEGY }}"
            echo "Force Update: ${{ env.FORCE_UPDATE }}"
            echo ""

            if [ "${{ steps.check_changes.outputs.changes }}" == "true" ]; then
              echo "✨ Updates Applied:"
              echo "  - 📦 Dependencies updated"
              echo "  - 🔒 Security audit executed"

              echo ""

              if [ "${{ env.UPDATE_STRATEGY }}" == "direct" ]; then
                echo "✅ Changes pushed to ${{ env.BASE_BRANCH }} branch"
                echo "📍 Commit: $(git rev-parse HEAD)"
              else
                echo "✅ Pull request created"
                echo "🔗 PR: ${{ steps.cpr.outputs.pull-request-url }}"
              fi
            else
              echo "✅ No updates needed - everything is current!"

            fi

            echo ""
            echo "════════════════════════════════════════════════════════"
            echo "⏰ Next run: 00:00 UTC (08:00 SGT)"
            echo "🚀 Manual trigger: Actions → Auto Update Dependencies"
            echo "════════════════════════════════════════════════════════"
          } >> "$GITHUB_STEP_SUMMARY"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
