---
name: ⛑️ Auto Update Dependencies

on:
  schedule:
    # Weekly at 00:00 UTC every Monday (07:00 WIB)
    - cron: '0 0 * * 1'
  # Manual trigger option
  workflow_dispatch:
    inputs:
      force_update:
        description: Continue even if checks fail
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

env:
  FORCE_UPDATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_update || 'false' }}
  OWNER_NAME: oxyzenQ
  OWNER_EMAIL: 130107241+oxyzenQ@users.noreply.github.com
  BASE_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24
  VERCEL_NODE_RUNTIME: nodejs24.x

jobs:
  auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          fetch-tags: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve Bun version
        id: bun-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').packageManager?.match(/^bun@(.+)$/)?.[1] || ''")"
          if [ -z "$version" ]; then
            echo "package.json packageManager must be bun@<version>" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install current dependencies
        run: bun install --frozen-lockfile

      - name: Audit current dependency tree
        run: bun run audit:deps

      - name: Update all dependencies
        run: |
          echo "🔄 Updating dependencies..."
          bun update

          echo "🔍 Checking for security vulnerabilities..."
          bun audit || true

      - name: Run quality checks
        run: |
          echo "✅ Running type checking..."
          bun run format:check
          bun run audit:loc
          bun run audit:headers
          bun run audit:pwa-offline
          bun run type-check

          echo "✅ Running linter..."
          bun run lint

          echo "✅ Running tests..."
          bun run test:ci
        continue-on-error: ${{ env.FORCE_UPDATE == 'true' }}

      - name: Build project
        run: |
          echo "🏗️ Building project..."
          bun run build

      - name: Check for changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "📦 No dependency updates available"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "📦 Dependencies updated!"
            git status --porcelain | head -n 200
            git diff --stat | head -n 200
          fi

      - name: Commit and push changes
        id: commit_msg
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          {
            echo "title=chore(deps): update dependencies"
            echo "commit_message=chore(deps): update dependencies"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --global user.name "${OWNER_NAME}"
          git config --global user.email "${OWNER_EMAIL}"

          git add -A
          git commit -m "${{ steps.commit_msg.outputs.commit_message }}" \
            -m "🤖 Automated by GitHub Actions" \
            -m "📦 Updated $(git status --porcelain | wc -l) file(s)" \
            -m "⏰ $(date -u '+%A, %B %d, %Y at %H:%M:%S UTC')" \
            -m "🎯 Workflow: auto-update.yml"
          git push origin "HEAD:${BASE_BRANCH}"

          echo "✅ Changes committed and pushed to ${BASE_BRANCH}!"

      - name: Summary
        if: always()
        run: |
          {
            echo "════════════════════════════════════════════════════════"
            echo "🤖 AUTO UPDATE SUMMARY"
            echo "════════════════════════════════════════════════════════"
            echo ""
            echo "Strategy: direct to ${BASE_BRANCH}"
            echo "Force Update: ${{ env.FORCE_UPDATE }}"
            echo ""

            if [ "${{ steps.check_changes.outputs.changes }}" == "true" ]; then
              echo "✨ Updates Applied:"
              echo "  - 📦 Dependencies updated"
              echo "  - 🔒 Security audit executed"

              echo ""

              echo "✅ Changes pushed to ${BASE_BRANCH} branch"
              echo "📍 Commit: $(git rev-parse HEAD)"
            else
              echo "✅ No updates needed - everything is current!"

            fi

            echo ""
            echo "════════════════════════════════════════════════════════"
            echo "⏰ Next run: Monday 00:00 UTC (07:00 WIB)"
            echo "🚀 Manual trigger: Actions → Auto Update Dependencies"
            echo "════════════════════════════════════════════════════════"
          } >> "$GITHUB_STEP_SUMMARY"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
