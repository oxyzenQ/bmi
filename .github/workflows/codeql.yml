---
name: '🔒 CodeQL Security Scan'

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'svelte.config.js'
      - 'svelte.config.static.js'
      - 'vite.config.ts'
      - '.github/codeql/**'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'svelte.config.js'
      - 'svelte.config.static.js'
      - 'vite.config.ts'
      - '.github/codeql/**'
      - '.github/workflows/codeql.yml'
  schedule:
    # Run at 8 AM SGT (00:00 UTC) every Monday
    - cron: '0 0 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          fetch-tags: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.2
        with:
          languages: ${{ matrix.language }}
          # Auto-detect queries (security and quality)
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.36.2
        with:
          category: '/language:${{matrix.language}}'
          upload: true
