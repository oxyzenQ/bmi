---
name: 💸 Release Publisher

on:
  push:
    tags:
      - 'Stellar-*'

permissions:
  contents: write

env:
  RELEASE_TAG_PREFIX: Stellar

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Get tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Validate tag format
        run: |
          TAG="${{ steps.tag.outputs.TAG_NAME }}"
          echo "Tag: $TAG"

          # Strict format: <prefix>-v<major>.<minor> (e.g., Stellar-v12.0)
          if [[ ! "$TAG" =~ ^${RELEASE_TAG_PREFIX}-v[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid tag format: $TAG"
            echo ""
            echo "Expected format: ${RELEASE_TAG_PREFIX}-v<major>.<minor>"
            echo "Examples:"
            echo "  ✅ ${RELEASE_TAG_PREFIX}-v12.0"
            echo "  ✅ ${RELEASE_TAG_PREFIX}-v10.5"
            echo ""
            echo "Invalid examples:"
            echo "  ❌ ${RELEASE_TAG_PREFIX}-12.0    (missing 'v' before version)"
            echo "  ❌ ${RELEASE_TAG_PREFIX} v12.0   (space instead of hyphen)"
            echo "  ❌ v12.0          (missing '${RELEASE_TAG_PREFIX}-' prefix)"
            exit 1
          fi

          echo "✅ Tag format valid: $TAG"

  release:
    needs: validate-tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Resolve Bun version
        id: bun-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').packageManager?.match(/^bun@(.+)$/)?.[1] || ''")"
          if [ -z "$version" ]; then
            echo "package.json packageManager must be bun@<version>" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Install dependencies (frozen)
        run: bun install --frozen-lockfile

      - name: Build static project
        shell: bash
        run: |
          set -euo pipefail
          cp svelte.config.js svelte.config.js.vercel

          cleanup() {
            cp svelte.config.js.vercel svelte.config.js
            rm -f svelte.config.js.vercel
            sed -i '/^export const prerender = true;$/d' src/routes/+layout.ts
          }
          trap cleanup EXIT

          cp svelte.config.static.js svelte.config.js
          printf '\nexport const prerender = true;\n' >> src/routes/+layout.ts
          bun run build

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${{ steps.tag.outputs.TAG_NAME }}$" | head -n 1)

          if [ -z "$PREVIOUS_TAG" ]; then
            # First release - get all commits from first commit
            FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD)
            COMMITS=$(git log "${FIRST_COMMIT}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            # Subsequent release - get commits since last tag
            COMMITS=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Save changelog to file
          {
            echo "CHANGELOG<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create source archive
        run: |
          TAG="${{ steps.tag.outputs.TAG_NAME }}"
          STAGE="release-source"

          # Clean staging dir
          rm -rf "$STAGE"
          mkdir -p "$STAGE"

          # Copy source code directories
          cp -r src "$STAGE/"
          cp -r static "$STAGE/"
          cp -r scripts "$STAGE/"
          cp -r .github "$STAGE/"
          cp -r docs "$STAGE/" 2>/dev/null || true

          # Copy config files needed to rebuild
          cp package.json "$STAGE/"
          cp bun.lock "$STAGE/" 2>/dev/null || true
          cp package-lock.json "$STAGE/" 2>/dev/null || true
          cp svelte.config.js "$STAGE/" 2>/dev/null || true
          cp svelte.config.static.js "$STAGE/" 2>/dev/null || true
          cp vite.config.ts "$STAGE/" 2>/dev/null || true
          cp tsconfig.json "$STAGE/" 2>/dev/null || true
          cp vitest.config.ts "$STAGE/" 2>/dev/null || true
          cp postcss.config.js "$STAGE/" 2>/dev/null || true
          cp eslint.config.js "$STAGE/" 2>/dev/null || true
          cp vercel.json "$STAGE/" 2>/dev/null || true
          cp verify.sh "$STAGE/" 2>/dev/null || true

          # Copy documentation
          cp README.md "$STAGE/" 2>/dev/null || true
          cp LICENSE.md "$STAGE/" 2>/dev/null || true
          cp SECURITY.md "$STAGE/" 2>/dev/null || true

          # Create source zip
          cd "$STAGE"
          zip -r "../bmi-stellar-source-${TAG}.zip" .
          cd ..

          # Generate SHA256 checksum
          sha256sum "bmi-stellar-source-${TAG}.zip" > "bmi-stellar-source-${TAG}.zip.sha256"

          # Clean up staging
          rm -rf "$STAGE"

      - name: Create build archive
        run: |
          TAG="${{ steps.tag.outputs.TAG_NAME }}"
          STAGE="release-build"

          # Clean staging dir
          rm -rf "$STAGE"
          mkdir -p "$STAGE"

          # Copy build output only
          cp -r build "$STAGE/"
          cp package.json "$STAGE/"
          cp README.md "$STAGE/" 2>/dev/null || true
          cp -r docs "$STAGE/" 2>/dev/null || true
          cp LICENSE.md "$STAGE/" 2>/dev/null || true

          # Create build zip
          cd "$STAGE"
          zip -r "../bmi-stellar-build-${TAG}.zip" .
          cd ..

          # Generate SHA256 checksum
          sha256sum "bmi-stellar-build-${TAG}.zip" > "bmi-stellar-build-${TAG}.zip.sha256"

          # Clean up staging
          rm -rf "$STAGE"

      - name: Create release notes
        id: release_notes
        run: |
          {
            echo "NOTES<<EOF"
            echo "# BMI Stellar - Release ${{ steps.tag.outputs.TAG_NAME }}"
            echo ""
            echo "## 🎉 What's New"
            echo ""
            echo "This release includes the latest improvements, bug fixes, and feature enhancements for BMI Stellar."
            echo ""
            echo "## 📦 Download Packages"
            echo ""
            echo "This release provides **two separate artifacts**:"
            echo ""
            echo "| Artifact | Description |"
            echo "|----------|-------------|"
            echo "| \`bmi-stellar-source-${{ steps.tag.outputs.TAG_NAME }}.zip\` | Full source code — rebuild from source |"
            echo "| \`bmi-stellar-build-${{ steps.tag.outputs.TAG_NAME }}.zip\` | Pre-built static output — deploy ready |"
            echo ""
            echo "### From Source"
            echo ""
            echo "\`\`\`bash"
            echo "# Extract the source archive"
            echo "unzip bmi-stellar-source-${{ steps.tag.outputs.TAG_NAME }}.zip -d bmi-stellar"
            echo ""
            echo "# Install dependencies"
            echo "cd bmi-stellar"
            echo "bun install"
            echo ""
            echo "# Build and preview"
            echo "bun run build"
            echo "bun run preview"
            echo "\`\`\`"
            echo ""
            echo "### From Build (Deploy Ready)"
            echo ""
            echo "\`\`\`bash"
            echo "# Extract the build archive"
            echo "unzip bmi-stellar-build-${{ steps.tag.outputs.TAG_NAME }}.zip -d bmi-stellar-deploy"
            echo ""
            echo "# Serve the static build with any HTTP server"
            echo "cd bmi-stellar-deploy"
            echo "npx serve build"
            echo "\`\`\`"
            echo ""
            echo "## 📋 Changelog"
            echo ""
            echo "${{ steps.changelog.outputs.CHANGELOG }}"
            echo ""
            echo "## 🔒 Security"
            echo ""
            echo "### Package Verification"
            echo ""
            echo "Verify the integrity of the downloaded package using SHA256:"
            echo ""
            echo "\`\`\`bash"
            echo "# Verify source archive"
            echo "sha256sum -c bmi-stellar-source-${{ steps.tag.outputs.TAG_NAME }}.zip.sha256"
            echo ""
            echo "# Verify build archive"
            echo "sha256sum -c bmi-stellar-build-${{ steps.tag.outputs.TAG_NAME }}.zip.sha256"
            echo "\`\`\`"
            echo ""
            echo "## 📄 License"
            echo ""
            echo "This project is licensed under the GPL v3 License. See the [LICENSE.md](LICENSE.md) file for details."
            echo ""
            echo "## 🙏 Acknowledgments"
            echo ""
            echo "Thank you to all contributors and users who made this release possible!"
            echo ""
            echo "---"
            echo ""
            echo "**Built with:** SvelteKit + TypeScript + Vite"
            echo "**Maintainer:** Rezky Nightky"
            echo "**Project:** BMI Stellar"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BMI Stellar ${{ steps.tag.outputs.TAG_NAME }}
          body: ${{ steps.release_notes.outputs.NOTES }}
          files: |
            bmi-stellar-source-${{ steps.tag.outputs.TAG_NAME }}.zip
            bmi-stellar-source-${{ steps.tag.outputs.TAG_NAME }}.zip.sha256
            bmi-stellar-build-${{ steps.tag.outputs.TAG_NAME }}.zip
            bmi-stellar-build-${{ steps.tag.outputs.TAG_NAME }}.zip.sha256
          draft: false
          prerelease: false
