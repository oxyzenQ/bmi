---
name: Maintenance deps weekly

on:
  schedule:
    # Weekly at 00:00 UTC every Monday (07:00 WIB)
    - cron: '0 0 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

env:
  OWNER_NAME: github-actions[bot]
  OWNER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
  BASE_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24
  VERCEL_NODE_RUNTIME: nodejs24.x

jobs:
  validate:
    name: Maintenance deps weekly validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    outputs:
      changed: ${{ steps.changes.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BASE_BRANCH }}
          persist-credentials: false
          fetch-depth: 1
          fetch-tags: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve Bun version
        id: bun-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').packageManager?.match(/^bun@(.+)$/)?.[1] || ''")"
          if [ -z "$version" ]; then
            echo "package.json packageManager must be bun@<version>" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install current dependencies
        run: bun install --frozen-lockfile

      - name: Audit current dependency tree
        run: bun run audit:deps

      - name: Update all dependencies
        run: |
          echo "Updating dependencies..."
          bun update --lockfile-only
          git restore --worktree --staged -- package.json
          echo "Checking for security vulnerabilities..."
          bun audit || true

      - name: Enforce dependency-only diff
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Dependencies are already up to date"
            exit 0
          fi

          git diff --name-only | tee /tmp/changed-files.txt
          if grep -vE '^bun\.lock$' /tmp/changed-files.txt; then
            echo "::error::Auto-update may only modify bun.lock"
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Run quality checks
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "Running type checking..."
          bun run format:check
          bun run audit:loc
          bun run audit:headers
          bun run audit:pwa-offline
          bun run type-check

          echo "Running linter..."
          bun run lint

          echo "Running tests..."
          bun run test:ci

      - name: Build project
        if: steps.changes.outputs.changed == 'true'
        run: bun run build

      - name: Upload validated bun.lock
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: validated-bun-lock
          path: bun.lock
          if-no-files-found: error

  commit:
    name: Maintenance deps weekly commit
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.changed == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BASE_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: false

      - name: Download validated bun.lock
        uses: actions/download-artifact@v6
        with:
          name: validated-bun-lock
          path: .auto-update

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          cp .auto-update/bun.lock bun.lock

          if git diff --quiet; then
            echo "Validated lockfile is already current"
            exit 0
          fi

          git diff --name-only | tee /tmp/changed-files.txt
          if grep -vE '^bun\.lock$' /tmp/changed-files.txt; then
            echo "::error::Commit job may only modify bun.lock"
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore(deps): maintenance deps weekly" \
            -m "Automated weekly lockfile refresh." \
            -m "Validated before commit with read-only token."
          git push origin "HEAD:${BASE_BRANCH}"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
