---
name: 📝 Documentation CI

on:
  push:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.rst'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.rst'
      - 'LICENSE'
      - 'NOTICE'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Docs Spelling Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install codespell
        run: python3 -m pip install --user codespell

      - name: Check documentation files
        run: |
          find . -type f \( -name '*.md' -o -name '*.txt' -o -name '*.rst' \) -print0             | xargs -0r codespell
