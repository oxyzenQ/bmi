---
name: 📝 Documentation CI

on:
  push:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'
      - 'NOTICE'

permissions:
  contents: read

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install -g prettier

      - name: Format check
        run: prettier --check "**/*.md"
