---
name: 📝 Documentation CI

on:
  push:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'
      - 'NOTICE'

permissions:
  contents: read

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Format check
        run: bun x prettier --check "**/*.md" --no-config
