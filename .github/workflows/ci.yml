---
name: 🛠️ CI

on:
  push:
    paths:
      - '**/*.svelte'
      - '**/*.ts'
      - '**/*.js'
      - '**/*.d.ts'
      - '**/*.css'
      - 'src/app.html'
      - 'static/manifest.json'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'svelte.config.js'
      - 'svelte.config.static.js'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'postcss.config.js'
      - 'eslint.config.js'
      - 'vercel.json'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**/*.svelte'
      - '**/*.ts'
      - '**/*.js'
      - '**/*.d.ts'
      - '**/*.css'
      - 'src/app.html'
      - 'static/manifest.json'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'svelte.config.js'
      - 'svelte.config.static.js'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'postcss.config.js'
      - 'eslint.config.js'
      - 'vercel.json'
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24
  VERCEL_NODE_RUNTIME: nodejs24.x

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve Bun version
        id: bun-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').packageManager?.match(/^bun@(.+)$/)?.[1] || ''")"
          if [ -z "$version" ]; then
            echo "package.json packageManager must be bun@<version>" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit
        run: bun run audit:deps

      - name: Format check
        run: bun run format:check

      - name: LOC check
        run: bun run audit:loc

      - name: Header check
        run: bun run audit:headers

      - name: PWA offline-shell check
        run: bun run audit:pwa-offline

      - name: Type check
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test:ci

      - name: Build
        run: bun run build
