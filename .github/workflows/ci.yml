---
name: CI

on:
  push:
    branches: [main, dev]
    paths:
      # Source code — always run CI
      - "src/**"
      - "scripts/**"
      # Config files that affect build
      - "package.json"
      - "bun.lock"
      - "package-lock.json"
      - "tsconfig.json"
      - "svelte.config.js"
      - "svelte.config.static.js"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "postcss.config.js"
      - "static/**"
      # Type definitions
      - "src/app.d.ts"
      - "src/types/**"
      - "*.d.ts"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test:run

      - name: Build
        run: bun run build
