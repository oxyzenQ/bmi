---
name: CI

on:
  push:
    paths:
      # Source code — always run CI
      - "src/**"
      - "scripts/**"
      # Config files that affect build
      - "package.json"
      - "bun.lock"
      - "package-lock.json"
      - "tsconfig.json"
      - "svelte.config.js"
      - "svelte.config.static.js"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "postcss.config.js"
      - "static/**"
      - ".github/workflows/**"
      # Type definitions
      - "src/app.d.ts"
      - "src/types/**"
      - "*.d.ts"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve Node.js version
        id: node-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').engines?.node || ''")"
          if [ -z "$version" ]; then
            echo "package.json engines.node is required" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-version.outputs.version }}

      - name: Resolve Bun version
        id: bun-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').packageManager?.match(/^bun@(.+)$/)?.[1] || ''")"
          if [ -z "$version" ]; then
            echo "package.json packageManager must be bun@<version>" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test:ci

      - name: Build
        run: bun run build
